    nombre: Inventario Inicial
    descripcion: Levantamiento y catalogación de productos
    precio_base: 5000
    unidad: proyecto
    
  - codigo: RTL-PRO
    nombre: Fotografía de Producto
    descripcion: Sesión de fotos para catalogo
    precio_base: 3000
    unidad: sesion
    
  - codigo: RTL-WEB
    nombre: Setup E-commerce
