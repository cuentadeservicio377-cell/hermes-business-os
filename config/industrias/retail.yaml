checklist_template:
  fases:
    - nombre: Setup
      tareas:
        - Configurar punto de venta
        - Cargar inventario inicial
        - Fotografiar productos
        - Entrenar al equipo
    - nombre: Lanzamiento
      tareas:
        - Publicar e-commerce
        - Lanzar campaña inicial
        - Monitorear ventas
        - Atención a clientes
    - nombre: Operación
      tareas:
        - Reabastecimiento
        - Reporte de ventas semanal
        - Ajuste de precios
        - Promociones
