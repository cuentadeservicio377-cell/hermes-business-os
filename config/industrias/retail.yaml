    unidad: campana

roles_equipo:
  - nombre: Gerente de Tienda
    tarifa_dia: 2000
    descripcion: Operación y supervisión
    
  - nombre: Vendedor/a
    tarifa_dia: 800
    descripcion: Atención al cliente
    
