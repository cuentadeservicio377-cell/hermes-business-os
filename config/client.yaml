# Hermes Business OS - Company Configuration
# Copy this file to client.yaml and customize for your business

company:
  name: "Mi Empresa"
  industry: "retail"  # Options: retail | eventos | legal | consultoria | restaurante | salud | tecnologia | general
  size: "small"       # Options: solopreneur | small | medium
  description: "Breve descripción de tu empresa"
  
departments:
  - name: "ventas"
    enabled: true
    description: "CRM, cotizaciones y seguimiento de clientes"
    skills:
      - cotizaciones
      - propuestas
      - seguimiento
      - clientes
    
  - name: "operaciones"
    enabled: true
    description: "Proyectos, tareas y logística"
    skills:
      - proyectos
      - tareas
      - timeline
      - checklist
    
  - name: "finanzas"
    enabled: false
    description: "Pagos, presupuestos y reportes financieros"
    skills:
      - presupuestos
      - reportes
      - pagos
    
  - name: "rrhh"
    enabled: false
    description: "Nómina, asistencia y equipos"
    skills:
      - nomina
      - asistencia
      - equipos
    
  - name: "inventario"
    enabled: false
    description: "Stock, proveedores y compras"
    skills:
      - stock
      - proveedores
      - compras
    
  - name: "documentos"
    enabled: true
    description: "Generación de documentos automáticos"
    skills:
      - pdf
      - google_docs
      - google_slides

integrations:
  google_workspace:
    enabled: true
    service_account: "config/google-service-account.json"
    spreadsheet_folder: "Hermes/Data"
    document_folder: "Hermes/Documents"
    
  telegram:
    enabled: true
    webhook_url: null  # Use polling if null
    
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    
  calendar:
    enabled: true
    provider: "google"

templates:
  document_style: "professional"  # professional | minimal | creative
  language: "es"
  currency: "MXN"
  date_format: "%d/%m/%Y"
  timezone: "America/Mexico_City"
  
  # Branding
  brand:
    primary_color: "#2563EB"
    secondary_color: "#1E40AF"
    logo_url: null
    
workflows:
  # Approval workflows
  cotizacion:
    requiere_aprobacion: false
    aprobadores: ["admin"]
    
  propuesta:
    requiere_aprobacion: true
    aprobadores: ["admin", "manager"]
    
  contrato:
    requiere_aprobacion: true
    aprobadores: ["admin"]
    
  pago:
    requiere_aprobacion: true
    aprobadores: ["admin"]
    monto_minimo: 10000
