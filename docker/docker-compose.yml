version: "3.8"

services:
  hermes-business-os:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-business-os
    restart: unless-stopped
    ports:
      - "3000:3000"    # Dashboard
    volumes:
      - ../data:/app/data
      - ../config:/app/config
      - ../skills:/app/skills
    environment:
      - NODE_ENV=production
      - HBOS_DATA_DIR=/app/data
      - HBOS_CONFIG_DIR=/app/config
    networks:
      - hbos-network

  # Optional: Redis for caching/sessions
  # redis:
  #   image: redis:7-alpine
  #   container_name: hbos-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - hbos-network

networks:
  hbos-network:
    driver: bridge

